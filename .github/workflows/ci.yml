name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck

  unit-tests:
    name: Unit Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:unit:coverage

      - name: Unit Test Report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always() && github.event_name != 'pull_request'
        with:
          name: Unit Test Results (Node ${{ matrix.node-version }})
          path: test-results/junit-unit.xml
          reporter: java-junit
          fail-on-error: true

      - name: Unit Test Report (PR)
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always() && github.event_name == 'pull_request'
        with:
          name: Unit Test Results (Node ${{ matrix.node-version }})
          path: test-results/junit-unit.xml
          reporter: java-junit
          fail-on-error: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Coverage Summary
        if: always() && matrix.node-version == 22
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const r = require('./coverage/coverage-summary.json').total;
              const fmt = (m) => \`\${m.pct}% (\${m.covered}/\${m.total})\`;
              const icon = (pct) => pct >= 90 ? '✅' : pct >= 70 ? '⚠️' : '❌';
              console.log('| Metric | Coverage | Status |');
              console.log('|--------|----------|--------|');
              for (const [key, val] of Object.entries(r)) {
                console.log(\`| \${key} | \${fmt(val)} | \${icon(val.pct)} |\`);
              }
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No coverage data found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Coverage PR Comment
        if: matrix.node-version == 22 && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          vite-config-path: vitest.config.unit.ts

      - name: Upload coverage artifact
        if: matrix.node-version == 22
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 1

      - name: Pack dry-run
        run: |
          echo "## Package Contents" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm pack --dry-run 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Run E2E tests
        run: npm run test:e2e

      - name: E2E Test Report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always() && github.event_name != 'pull_request'
        with:
          name: E2E Test Results
          path: test-results/junit-e2e.xml
          reporter: java-junit
          fail-on-error: true

      - name: E2E Test Report (PR)
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always() && github.event_name == 'pull_request'
        with:
          name: E2E Test Results
          path: test-results/junit-e2e.xml
          reporter: java-junit
          fail-on-error: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: E2E Summary
        if: always()
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f test-results/junit-e2e.xml ]; then
            TESTS=$(grep -o 'tests="[0-9]*"' test-results/junit-e2e.xml | head -1 | grep -o '[0-9]*')
            FAILURES=$(grep -o 'failures="[0-9]*"' test-results/junit-e2e.xml | head -1 | grep -o '[0-9]*')
            if [ "$FAILURES" = "0" ]; then
              echo "✅ All $TESTS E2E tests passed" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ $FAILURES/$TESTS E2E tests failed" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ No E2E test results found" >> $GITHUB_STEP_SUMMARY
          fi
