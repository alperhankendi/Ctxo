name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.9.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build workspace first so cli can resolve types from @ctxo/plugin-api/dist.
      - name: Build workspace packages
        run: pnpm -r build

      - name: Lint
        run: pnpm -r lint
      - name: Typecheck
        run: pnpm -r typecheck

  unit-tests:
    name: Unit Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.9.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # plugin-api + lang-* export dist/index.js; tests resolve them via the
      # workspace link which requires the build output to exist.
      - name: Build workspace packages
        run: pnpm -r build

      - name: Run unit tests with coverage
        run: pnpm --filter @ctxo/cli test:unit:coverage

      - name: Unit Test Report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always() && github.event_name != 'pull_request'
        with:
          name: Unit Test Results (Node ${{ matrix.node-version }})
          path: packages/cli/test-results/junit-unit.xml
          reporter: java-junit
          fail-on-error: true

      - name: Unit Test Report (PR)
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always() && github.event_name == 'pull_request'
        with:
          name: Unit Test Results (Node ${{ matrix.node-version }})
          path: packages/cli/test-results/junit-unit.xml
          reporter: java-junit
          fail-on-error: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Coverage Summary
        if: always() && matrix.node-version == 22
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f packages/cli/coverage/coverage-summary.json ]; then
            node -e "
              const r = require('./packages/cli/coverage/coverage-summary.json').total;
              const fmt = (m) => \`\${m.pct}% (\${m.covered}/\${m.total})\`;
              const icon = (pct) => pct >= 90 ? '✅' : pct >= 70 ? '⚠️' : '❌';
              console.log('| Metric | Coverage | Status |');
              console.log('|--------|----------|--------|');
              for (const [key, val] of Object.entries(r)) {
                console.log(\`| \${key} | \${fmt(val)} | \${icon(val.pct)} |\`);
              }
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No coverage data found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Coverage PR Comment
        if: matrix.node-version == 22 && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: packages/cli/coverage/coverage-summary.json
          vite-config-path: packages/cli/vitest.config.unit.ts

      - name: Upload coverage artifact
        if: matrix.node-version == 22
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: packages/cli/coverage/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.9.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: packages/cli/dist/
          retention-days: 1

      - name: Pack dry-run (all publishable packages)
        run: |
          echo "## Package Contents" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for pkg in @ctxo/plugin-api @ctxo/cli @ctxo/lang-typescript @ctxo/lang-go @ctxo/lang-csharp; do
            echo "### $pkg" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            pnpm --filter "$pkg" pack --dry-run 2>&1 | grep -E "^npm notice" | tee -a $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          done

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.9.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build plugin-api + lang-* so cli can resolve their dist entries at runtime.
      - name: Build workspace packages
        run: pnpm -r build

      - name: Run E2E tests
        run: pnpm --filter @ctxo/cli test:e2e

      - name: E2E Test Report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always() && github.event_name != 'pull_request'
        with:
          name: E2E Test Results
          path: packages/cli/test-results/junit-e2e.xml
          reporter: java-junit
          fail-on-error: true

      - name: E2E Test Report (PR)
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always() && github.event_name == 'pull_request'
        with:
          name: E2E Test Results
          path: packages/cli/test-results/junit-e2e.xml
          reporter: java-junit
          fail-on-error: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: E2E Summary
        if: always()
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f packages/cli/test-results/junit-e2e.xml ]; then
            TESTS=$(grep -o 'tests="[0-9]*"' packages/cli/test-results/junit-e2e.xml | head -1 | grep -o '[0-9]*')
            FAILURES=$(grep -o 'failures="[0-9]*"' packages/cli/test-results/junit-e2e.xml | head -1 | grep -o '[0-9]*')
            if [ "$FAILURES" = "0" ]; then
              echo "✅ All $TESTS E2E tests passed" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ $FAILURES/$TESTS E2E tests failed" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ No E2E test results found" >> $GITHUB_STEP_SUMMARY
          fi
