name: Deploy Site to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - pages/**
      - site/**
      - docs/public/**
      - .ctxo/index/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install site deps
        run: pnpm install --filter @ctxo/site... --frozen-lockfile=false

      - name: Build VitePress site
        run: pnpm --filter @ctxo/site build

      - name: Prepare deploy
        run: |
          mkdir -p _site/ctxo-index
          cp -r pages/* _site/
          cp -r .ctxo/index/* _site/ctxo-index/
          touch _site/.nojekyll
          cd _site/ctxo-index && find . -name '*.json' -type f | sed 's|^\./||' | sort > manifest.txt

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
