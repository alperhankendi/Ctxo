name: Deploy Visualizer to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - pages/**
      - .ctxo/index/**

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepare site
        run: |
          mkdir -p _site/ctxo-index
          cp -r pages/* _site/
          cp -r .ctxo/index/* _site/ctxo-index/
          touch _site/.nojekyll
          # Generate manifest of all JSON files for the visualizer
          cd _site/ctxo-index && find . -name '*.json' -type f | sed 's|^\./||' | sort > manifest.txt
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
