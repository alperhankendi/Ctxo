  <rect class="sf" x="24" y="110" width="424" height="290" rx="12"/>
  <rect class="tr" x="24" y="110" width="424" height="3" rx="1.5"/>
  <text x="52" y="140" class="lb lr">WITHOUT CTXO</text>

  <g class="sl" stroke-width="1">
