  <g transform="translate(538,386)" class="mci" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="8" cy="8" r="7"/><line x1="1" y1="8" x2="15" y2="8"/>
    <path d="M8 1a10.7 10.7 0 012.8 7A10.7 10.7 0 018 15a10.7 10.7 0 01-2.8-7A10.7 10.7 0 018 1z"/>
  </g>
  <text x="558" y="399">
    <tspan class="mc">Built on </tspan><tspan class="mcb">MCP</tspan>
    <tspan class="mc"> — Claude Code · Copilot · Cursor · Windsurf · Augment · Amazon Q &amp; more</tspan>
  </text>

