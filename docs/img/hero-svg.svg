<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" fill="none">
  <defs>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff4060"/><stop offset="100%" stop-color="#ff8a3d"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e88f"/><stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="redGradL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dc2f4e"/><stop offset="100%" stop-color="#d97218"/>
    </linearGradient>
    <linearGradient id="greenGradL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800');

      .bg{fill:#0a0a0f} .sf{fill:#12121a;stroke:#1e1e2e}
      .t1{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:800;letter-spacing:6px;fill:#e2e2ef}
      .t2{font-family:'JetBrains Mono',monospace;font-size:20px;fill:#00d4ff}
      .t2b{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;fill:#e2e2ef}
      .lb{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:2px}
      .nt{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700}
      .pr{font-family:'JetBrains Mono',monospace;font-size:11px;fill:#6b6b80}
      .xm{font-family:'JetBrains Mono',monospace;font-size:11px;fill:#ff4060}
      .ck{font-family:'JetBrains Mono',monospace;font-size:11px;fill:#00e88f}
      .ml{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1.5px;fill:#6b6b80}
      .mo{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;fill:#ff4060;text-decoration:line-through;opacity:.6}
      .mn{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:800;fill:#00e88f}
      .mb{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;fill:#00e88f}
      .vs{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:800;fill:#3a3a50;letter-spacing:2px}
      .ft{font-family:'JetBrains Mono',monospace;font-size:11px;fill:#6b6b80}
      .ov{font-family:'JetBrains Mono',monospace;font-size:10px;fill:#ff4060}
      .cl{font-family:'JetBrains Mono',monospace;font-size:9px;fill:#6b6b80}
      .cg{font-family:'JetBrains Mono',monospace;font-size:9px;fill:#00e88f}
      .mc{font-family:'JetBrains Mono',monospace;font-size:9px;fill:#5a5a70}
      .mcb{font-family:'JetBrains Mono',monospace;font-size:9px;fill:#6b6b80;font-weight:700}

      .lr{fill:#ff4060} .lo{fill:#ff8a3d} .lp{fill:#a78bfa} .lg{fill:#00e88f} .lc{fill:#00d4ff}
      .nr{fill:rgba(255,64,96,.1);stroke:rgba(255,64,96,.3)}
      .no{fill:rgba(255,138,61,.1);stroke:rgba(255,138,61,.3)}
      .np{fill:rgba(167,139,250,.1);stroke:rgba(167,139,250,.3)}
      .ca{fill:rgba(0,212,255,.1);stroke:rgba(0,212,255,.3)}
      .cc{fill:rgba(0,232,143,.12);stroke:#00e88f}
      .cd{fill:rgba(0,232,143,.08);stroke:rgba(0,232,143,.25)}
      .ob{fill:rgba(255,64,96,.08)}
      .bb{fill:rgba(0,232,143,.1);stroke:rgba(0,232,143,.2)}
      .sl{stroke:#ff4060;opacity:.2}
      .gl{opacity:.5}
      .tr{fill:url(#redGrad)} .tg{fill:url(#greenGrad)}
      .af{fill:#00e88f} .as{stroke:url(#greenGrad)}
      .icon-cyan{stroke:#00d4ff;fill:none} .icon-green{stroke:#00e88f;fill:none}
      .mcbg{fill:rgba(0,212,255,.05);stroke:rgba(0,212,255,.15)}
      .mci{stroke:#00d4ff;fill:none}

      @media(prefers-color-scheme:light){
        .bg{fill:#f8f9fc} .sf{fill:#fff;stroke:#e2e4ea}
        .t1{fill:#1a1a2e} .t2{fill:#0891b2} .t2b{fill:#1a1a2e}
        .pr{fill:#6e7181} .xm{fill:#dc2f4e} .ck{fill:#059669}
        .ml{fill:#6e7181} .mo{fill:#dc2f4e;opacity:.5} .mn{fill:#059669} .mb{fill:#059669}
        .vs{fill:#b0b3c0} .ft{fill:#6e7181} .ov{fill:#dc2f4e}
        .cl{fill:#6e7181} .cg{fill:#059669}
        .mc{fill:#6e7181} .mcb{fill:#6e7181}
        .lr{fill:#dc2f4e} .lo{fill:#d97218} .lp{fill:#7c3aed} .lg{fill:#059669} .lc{fill:#0891b2}
        .nr{fill:rgba(220,47,78,.07);stroke:rgba(220,47,78,.22)}
        .no{fill:rgba(217,114,24,.07);stroke:rgba(217,114,24,.22)}
        .np{fill:rgba(124,58,237,.07);stroke:rgba(124,58,237,.22)}
        .ca{fill:rgba(8,145,178,.07);stroke:rgba(8,145,178,.22)}
        .cc{fill:rgba(5,150,105,.08);stroke:#059669}
        .cd{fill:rgba(5,150,105,.05);stroke:rgba(5,150,105,.18)}
        .ob{fill:rgba(220,47,78,.05)}
        .bb{fill:rgba(5,150,105,.07);stroke:rgba(5,150,105,.18)}
        .sl{stroke:#dc2f4e;opacity:.15}
        .gl{opacity:.6}
        .tr{fill:url(#redGradL)} .tg{fill:url(#greenGradL)}
        .af{fill:#059669} .as{stroke:url(#greenGradL)}
        .icon-cyan{stroke:#0891b2} .icon-green{stroke:#059669}
        .mcbg{fill:rgba(8,145,178,.04);stroke:rgba(8,145,178,.12)}
        .mci{stroke:#0891b2}
      }
