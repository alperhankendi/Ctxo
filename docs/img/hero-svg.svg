    <line x1="260" y1="180" x2="215" y2="245"/><line x1="75" y1="175" x2="260" y2="180"/>
    <line x1="330" y1="215" x2="215" y2="245"/><line x1="115" y1="250" x2="290" y2="280"/>
    <line x1="185" y1="210" x2="330" y2="215"/><line x1="360" y1="190" x2="260" y2="180"/>
    <line x1="360" y1="190" x2="350" y2="265"/><line x1="160" y1="275" x2="290" y2="280"/>
    <line x1="115" y1="250" x2="160" y2="275"/><line x1="215" y1="245" x2="160" y2="275"/>
  </g>

  <rect class="nr" x="56" y="160" width="38" height="30" rx="6"/><text x="75" y="179" text-anchor="middle" class="nt lr">grep</text>
  <rect class="np" x="166" y="196" width="38" height="30" rx="6"/><text x="185" y="215" text-anchor="middle" class="nt lp">read</text>
  <rect class="nr" x="241" y="166" width="38" height="30" rx="6"/><text x="260" y="185" text-anchor="middle" class="nt lr">find</text>
  <rect class="no" x="311" y="200" width="38" height="30" rx="6"/><text x="330" y="219" text-anchor="middle" class="nt lo">grep</text>
  <rect class="np" x="96" y="236" width="38" height="30" rx="6"/><text x="115" y="255" text-anchor="middle" class="nt lp">read</text>
  <rect class="nr" x="196" y="231" width="38" height="30" rx="6"/><text x="215" y="250" text-anchor="middle" class="nt lr">read</text>
  <rect class="no" x="141" y="261" width="38" height="30" rx="6"/><text x="160" y="280" text-anchor="middle" class="nt lo">grep</text>
  <rect class="np" x="271" y="266" width="38" height="30" rx="6"/><text x="290" y="285" text-anchor="middle" class="nt lp">read</text>
  <rect class="nr" x="341" y="176" width="38" height="30" rx="6"/><text x="360" y="195" text-anchor="middle" class="nt lr">find</text>
  <rect class="no" x="331" y="251" width="38" height="30" rx="6"/><text x="350" y="270" text-anchor="middle" class="nt lo">read</text>

  <rect class="ob" x="24" y="298" width="424" height="28"/>
  <text x="236" y="316" text-anchor="middle" class="ov">⚠ CONTEXT OVERFLOW</text>

  <text x="52" y="346"><tspan class="xm">✕ </tspan><tspan class="pr">Context window saturated</tspan></text>
  <text x="52" y="363"><tspan class="xm">✕ </tspan><tspan class="pr">Partial context hallucination</tspan></text>
  <text x="52" y="380"><tspan class="xm">✕ </tspan><tspan class="pr">Lost-in-the-middle / context poisoning</tspan></text>
  <text x="52" y="397"><tspan class="xm">✕ </tspan><tspan class="pr">10-20 tool calls per symbol</tspan></text>

  <text x="480" y="260" text-anchor="middle" class="vs">VS</text>

  <!-- RIGHT PANEL -->
  <rect class="sf" x="512" y="110" width="424" height="290" rx="12"/>
  <rect class="tg" x="512" y="110" width="424" height="3" rx="1.5"/>
  <text x="540" y="140" class="lb lg">WITH CTXO</text>

  <!-- Agent node -->
  <rect class="ca" x="574" y="210" width="52" height="52" rx="12"/>
  <g transform="translate(588,222)" class="icon-cyan" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="1" y="1" width="22" height="15" rx="2"/><path d="M7 20h10"/><path d="M12 16v4"/>
    <path d="M6 7l3 3-3 3"/><line x1="12" y1="13" x2="17" y2="13"/>
  </g>
  <text x="600" y="278" text-anchor="middle" class="cl">Agent</text>

  <line class="as" x1="634" y1="236" x2="684" y2="236" stroke-width="2"/>
  <polygon class="af" points="684,232 692,236 684,240"/>

  <!-- Ctxo node -->
  <rect class="cc" x="700" y="202" width="64" height="64" rx="16" stroke-width="2" filter="url(#glow)"/>
  <g transform="translate(718,218)" class="icon-green" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 1L4 13h8l-1 8L21 9h-8l1-8z"/>
  </g>
  <text x="732" y="282" text-anchor="middle" class="cg">Ctxo</text>

  <line class="as" x1="772" y1="236" x2="822" y2="236" stroke-width="2"/>
  <polygon class="af" points="822,232 830,236 822,240"/>

  <!-- Done node -->
  <rect class="cd" x="838" y="210" width="52" height="52" rx="12"/>
  <g transform="translate(850,222)" class="icon-green" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/>
  </g>
  <text x="864" y="278" text-anchor="middle" class="cl">Done</text>

  <text x="540" y="316"><tspan class="ck">✓ </tspan><tspan class="pr">Clean, relevant context only</tspan></text>
  <text x="540" y="333"><tspan class="ck">✓ </tspan><tspan class="pr">One call replaces full exploration</tspan></text>
  <text x="540" y="350"><tspan class="ck">✓ </tspan><tspan class="pr">Structured symbol graphs + deps</tspan></text>
  <text x="540" y="367"><tspan class="ck">✓ </tspan><tspan class="pr">Built-in usage stats &amp; insights</tspan></text>

  <!-- MCP strip -->
