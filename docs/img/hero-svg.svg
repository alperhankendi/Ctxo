  <rect class="bg" width="960" height="560" rx="16"/>

  <!-- Header -->
  <g transform="translate(448,14) scale(1.5)">
    <path class="icon-cyan" d="M10 1L2 11h7l-.8 6.4L16 7H9l1-6z" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="480" y="40" text-anchor="start" class="t1">CTXO</text>
  <text x="480" y="68" text-anchor="middle">
    <tspan class="t2">AI agents don't fail because they can't code.</tspan>
  </text>
  <text x="480" y="94" text-anchor="middle">
    <tspan class="t2">They fail because they </tspan><tspan class="t2b">code blind</tspan><tspan class="t2">.</tspan>
  </text>
  <text x="480" y="120" text-anchor="middle">
    <tspan class="t2">Ctxo gives them the full picture </tspan><tspan class="t2b">before they write a single line</tspan><tspan class="t2">.</tspan>
  </text>

  <!-- Panels + Metrics (shifted down for header spacing) -->
  <g transform="translate(0,20)">

