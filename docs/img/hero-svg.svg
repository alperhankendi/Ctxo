  <rect class="sf" x="24" y="420" width="296" height="80" rx="12"/>
  <rect class="gl" x="24" y="498" width="296" height="2" rx="1" fill="url(#greenGrad)"/>
  <text x="172" y="444" text-anchor="middle" class="ml">TOKEN USAGE</text>
  <text x="120" y="472" text-anchor="middle" class="mo">140K</text>
  <text x="157" y="472" text-anchor="middle" class="ft">→</text>
  <text x="200" y="474" text-anchor="middle" class="mn">2.9K</text>
  <rect class="bb" x="240" y="458" width="60" height="22" rx="11"/>
  <text x="270" y="473" text-anchor="middle" class="mb">48× ↓</text>

  <rect class="sf" x="332" y="420" width="296" height="80" rx="12"/>
  <rect class="gl" x="332" y="498" width="296" height="2" rx="1" fill="url(#greenGrad)"/>
  <text x="480" y="444" text-anchor="middle" class="ml">TOOL CALLS</text>
  <text x="428" y="472" text-anchor="middle" class="mo">409+</text>
  <text x="465" y="472" text-anchor="middle" class="ft">→</text>
  <text x="500" y="474" text-anchor="middle" class="mn">8</text>
  <rect class="bb" x="532" y="458" width="60" height="22" rx="11"/>
  <text x="562" y="473" text-anchor="middle" class="mb">51× ↓</text>

  <rect class="sf" x="640" y="420" width="296" height="80" rx="12"/>
  <rect class="gl" x="640" y="498" width="296" height="2" rx="1" fill="url(#greenGrad)"/>
  <text x="788" y="444" text-anchor="middle" class="ml">CONTEXT FREE</text>
  <text x="724" y="472" text-anchor="middle" class="mo">Overflow</text>
  <text x="773" y="472" text-anchor="middle" class="ft">→</text>
  <text x="812" y="474" text-anchor="middle" class="mn">97%</text>
  <rect class="bb" x="848" y="458" width="68" height="22" rx="11"/>
