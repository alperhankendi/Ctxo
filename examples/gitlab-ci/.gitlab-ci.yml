# Ctxo Index Freshness Check (GitLab CI)
#
# Merge this snippet into your .gitlab-ci.yml. It fails the MR if the committed
# .ctxo/index/ is stale, prompting the author to run `ctxo index` locally.
#
# Prerequisites:
#   - .ctxo/index/ is committed to the repo (see `ctxo init`)
#   - Node.js 20+ in the runner image

ctxo-index-check:
  stage: test
  image: node:22
  variables:
    GIT_DEPTH: 0  # ctxo reads git history for intent/anti-patterns
  script:
    - npx -y @ctxo/cli index --check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
